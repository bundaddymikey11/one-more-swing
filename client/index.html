<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />

    <meta name="description" content="Luxury mobile golf simulator rentals bringing the world's most iconic courses to your Southern California events. Elevate your corporate outings, weddings, and private parties." />
    <meta property="og:title" content="One More Swing | Ultra-Premium Mobile Golf Simulator" />
    <meta property="og:description" content="The world's most advanced mobile golf simulator, delivered to your doorstep. Experience ultra-premium luxury for your next event in Southern California." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/hero-socal.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="One More Swing | Premium Mobile Golf Simulator" />
    <meta name="twitter:description" content="Experience the ultimate mobile golf simulator. Premium rentals for weddings, corporate events, and private parties in Southern California." />
    <meta name="twitter:image" content="/images/hero-socal.png" />
    
    <!-- Apple Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="One More Swing" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      #site-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #050505;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #site-loader.loader-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .loader-stage {
        position: relative;
        width: 160px;
        height: 60px;
      }
      .loader-hole {
        position: absolute;
        bottom: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: 28px;
        height: 10px;
        border-radius: 50%;
        background: radial-gradient(ellipse at center, #000 0%, #0a0a0a 50%, transparent 100%);
        box-shadow: 0 0 6px 2px rgba(0,0,0,0.6);
      }
      .loader-ball {
        position: absolute;
        bottom: 10px;
        left: 0;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #fff 0%, #e8e8e8 40%, #c0c0c0 100%);
        box-shadow: 1px 2px 4px rgba(0,0,0,0.4), inset -1px -1px 2px rgba(0,0,0,0.1);
        animation: ball-roll 1.7s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      .loader-ball::after {
        content: "";
        position: absolute;
        top: 4px;
        left: 5px;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: rgba(0,0,0,0.08);
        box-shadow: 4px 3px 0 rgba(0,0,0,0.06), -2px 5px 0 rgba(0,0,0,0.05);
      }
      .loader-text {
        margin-top: 28px;
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.25);
      }
      @keyframes ball-roll {
        0% {
          left: 0;
          bottom: 10px;
          transform: rotate(0deg) scale(1);
          opacity: 1;
        }
        55% {
          left: calc(50% - 9px);
          bottom: 10px;
          transform: rotate(360deg) scale(1);
          opacity: 1;
        }
        72% {
          left: calc(50% - 9px);
          bottom: 4px;
          transform: rotate(420deg) scale(0.7);
          opacity: 0.6;
        }
        82% {
          left: calc(50% - 9px);
          bottom: -4px;
          transform: rotate(450deg) scale(0.35);
          opacity: 0;
        }
        83%, 100% {
          left: 0;
          bottom: 10px;
          transform: rotate(0deg) scale(0);
          opacity: 0;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .loader-ball {
          animation: none;
          left: calc(50% - 9px);
          opacity: 1;
        }
        .loader-text::after {
          content: "";
          display: inline-block;
          width: 12px;
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="site-loader" aria-label="Loading">
      <div class="loader-stage">
        <div class="loader-hole"></div>
        <div class="loader-ball"></div>
      </div>
      <div class="loader-text">Just one more swing…</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
